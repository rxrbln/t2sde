build_alt_binutils() {
    (
	mkdir -p objdir2; cd objdir2
	arch_sizeof_long=8
	arch_sizeof_char_p=8
	arch_machine=hppa64
	arch_target="hppa64-t2-linux-gnu"

	eval_config_command $confopt
	eval $MAKE $makeopt
	eval $MAKE $makeinstopt
    )
}
hook_add preconf 2 build_alt_binutils
