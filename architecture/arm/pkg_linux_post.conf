#lx_defconfig=arch/$lx_cpu/configs/"$SDECFG_ARM_BOARDDEF"_defconfig

# generate a valid kernel config before running autoconf()
if [ "$SDECFG_ARM_BOARDDEF" != "none" ]; then
	hook_add postpatch 3 'eval $MAKE $makeopt ${SDECFG_ARM_BOARDDEF}_defconfig; cp .config .config.defconfig'
fi
