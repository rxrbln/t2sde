if [ "$JAVA_HOME" == "/$(pkgprefix kaffe)" ]; then
	JAVA=kaffe
	export JAVA

	hook_add premake 5 "var_append makeopt ' ' \
		\"'JAVACFLAGS=-cp \$builddir/\$xsrcdir/java/src'\""
fi
