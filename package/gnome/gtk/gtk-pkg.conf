if [ $pkg != gtk ]; then
	# exclude some gconf files - so we do not need to patch every
	# single package ...
	flistdel="$flistdel|${sysconfdir#/}/gtk-2.0/gdk-pixbuf.loaders"
	# exclude files generated by gtk-update-icon-cache
	flistdel="$flistdel|$prefix/share/icons/hicolor/icon-theme.cache"
fi
